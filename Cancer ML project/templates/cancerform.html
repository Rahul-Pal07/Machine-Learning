<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Prediction</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins',sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-content: center;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        .container{
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        h1{
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label{
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input{
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        
        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff4d6d;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .modal{

            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0,0.6);
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal:target{
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content{
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
            color: #333;
        }

        .close-btn{
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🧬 Cancer Prediction</h1>

    <form action="/predict" method="post">
        <div class="input-group">
            <label>Radius Mean</label>
            <input type="number" step="any" name="radius" required>
        </div>

        <div class="input-group">
            <label>Texture Mean</label>
            <input type="number" step="any" name="texture" required>
        </div>

        <div class="input-group">
            <label>Perimeter Mean</label>
            <input type="number" step="any" name="perimeter" required>
        </div>

        <div class="input-group">
            <label>Area Mean</label>
            <input type="number" step="any" name="area" required>
        </div>

        <div class="input-group">
            <label>Smoothness Mean</label>
            <input type="number" step="any" name="smoothness" required>
        </div>

        <button type="submit">Predict</button>
    </form>
</div>

<!-- Popup -->

<div id="popup" class="modal" {% if show_popup %}style="opacity:1; pointer-events:auto"{% endif %}>
    <div class="modal-content">
        <h3>Prediction Result</h3>
        <p>{{ Prediction_text }}</p>
        <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
function closePopup() {
    const popup = document.getElementById("popup");
    popup.style.opacity = "0";
    popup.style.pointerEvents = "none";
}
</script>

</body>
</html>
